<svg width="1200" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="textShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="3" dy="3" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.1" />
    </linearGradient>
  </defs>

  <!-- Arka Plan -->
  <rect width="1200" height="400" fill="#ffffff"/>
  
  <!-- Gradient Overlay -->
  <rect width="1200" height="400" fill="url(#bgGradient)"/>
  
  <!-- Sağ Taraf Dekoratif Element (G-Man'ın yerinde) -->
  <circle cx="1000" cy="200" r="150" fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0.1"/>
  <circle cx="1000" cy="200" r="120" fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0.15"/>
  <circle cx="1000" cy="200" r="90" fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0.2"/>

  <!-- Ana Başlık -->
  <text 
    x="250" 
    y="160" 
    font-family="'Times New Roman', serif" 
    font-size="64" 
    font-weight="bold" 
    fill="#1a1a1a"
    filter="url(#textShadow)"
  >
    Whoam main
  </text>

  <!-- Alt Başlık -->
  <text 
    x="250" 
    y="240" 
    font-family="'Times New Roman', serif" 
    font-size="20" 
    fill="#444"
    font-style="italic"
    filter="url(#textShadow)"
  >
    Wh04m / W-Whoam / Who
  </text>
</svg>