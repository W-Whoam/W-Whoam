<svg width="1200" height="400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <filter id="textShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="3" dy="3" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- G-Man Görsel -->
  <image 
    xlink:href="https://static.wikia.nocookie.net/half-life/images/5/5b/Ep2_outland_020019.JPG/revision/latest?cb=20090612023847&amp;path-prefix=en" 
    x="660" 
    y="0" 
    width="540" 
    height="400" 
    preserveAspectRatio="xMidYMid slice"
    opacity="0.95"
  />

  <!-- Ana Başlık -->
  <text 
    x="400" 
    y="160" 
    font-family="'Times New Roman', serif" 
    font-size="56" 
    font-weight="bold" 
    fill="#1a1a1a"
    filter="url(#textShadow)"
    text-anchor="middle"
  >
    Whoam main
  </text>

  <!-- Alt Başlık -->
  <text 
    x="400" 
    y="220" 
    font-family="'Times New Roman', serif" 
    font-size="18" 
    fill="#444"
    font-style="italic"
    filter="url(#textShadow)"
    text-anchor="middle"
  >
    Wh04m / W-Whoam / Who
  </text>
</svg>