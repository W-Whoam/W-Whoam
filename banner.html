<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Profile Banner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Times New Roman', Times, serif;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .banner {
            width: 100%;
            max-width: 1200px;
            height: 400px;
            position: relative;
            overflow: hidden;
            background: transparent;
        }

        .banner-image {
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            z-index: 1;
            object-fit: cover;
        }

        .banner-content {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 55%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 50px;
            z-index: 2;
        }

        .banner-title {
            font-family: 'Times New Roman', Times, serif;
            font-size: 56px;
            font-weight: bold;
            color: #1a1a1a;
            margin-bottom: 15px;
            line-height: 1.2;
            text-shadow: 3px 3px 12px rgba(0, 0, 0, 0.4);
        }

        .banner-subtitle {
            font-family: 'Times New Roman', Times, serif;
            font-size: 18px;
            color: #444;
            font-style: italic;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.3);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .banner {
                height: 280px;
            }

            .banner-content {
                width: 100%;
                padding: 30px;
            }

            .banner-title {
                font-size: 36px;
            }

            .banner-subtitle {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="banner">
        <img class="banner-image" src="https://static.wikia.nocookie.net/half-life/images/5/5b/Ep2_outland_020019.JPG/revision/latest?cb=20090612023847&path-prefix=en" alt="The G-Man">
        <div class="banner-content">
            <div class="banner-title">Whoam main</div>
            <div class="banner-subtitle">Wh04m / W-Whoam / Who</div>
        </div>
    </div>
</body>
</html>
